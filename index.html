<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Continent de Thair</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      display: flex;
      height: 100vh;
      font-family: Arial, sans-serif;
      background: #111;
    }

    #map-container {
      position: relative;
      width: 70%;
      overflow: auto;
      background: #111;
      cursor: grab;
    }

    #map-container.dragging {
      cursor: grabbing;
    }

    /* Nouveau conteneur zoomable */
    #map-stage {
      position: relative;
      transform-origin: top left;
      width: fit-content;
    }

    #map {
      display: block;
      max-width: none;
      width: 100%;
    }

    .marker {
      position: absolute;
      transform: translate(-50%, -50%);
      background: #3b1e0f;
      color: #f0d68a;
      padding: 6px 12px;
      border-radius: 8px;
      cursor: pointer;
      border: 2px solid #c9a44c;
      font-weight: bold;
      box-shadow: 0 0 8px rgba(0,0,0,0.6);
      transition: transform 0.2s, box-shadow 0.2s, background 0.2s;
      white-space: nowrap;
      z-index: 10;
    }

    .marker:hover {
      transform: translate(-50%, -50%) scale(1.1);
      box-shadow: 0 0 15px rgba(255, 215, 100, 0.8);
      background: #5a2d14;
    }

    #zoom-controls {
      position: absolute;
      top: 12px;
      left: 12px;
      z-index: 50;
      display: flex;
      gap: 8px;
      background: rgba(20, 12, 8, 0.85);
      padding: 8px;
      border-radius: 10px;
      border: 1px solid #8c6a34;
      box-shadow: 0 0 10px rgba(0,0,0,0.4);
    }

    .zoom-btn {
      background: #3b1e0f;
      color: #f0d68a;
      border: 1px solid #c9a44c;
      border-radius: 6px;
      padding: 6px 10px;
      cursor: pointer;
      font-weight: bold;
    }

    .zoom-btn:hover {
      background: #5a2d14;
    }

    #info {
      width: 30%;
      padding: 25px;
      background: #e2cfa0;
      color: #2b1e12;
      overflow-y: auto;
      box-sizing: border-box;
      font-family: Georgia, serif;
      line-height: 1.7;
      border-left: 8px solid #4a3215;
      background-image: url("https://www.transparenttextures.com/patterns/old-paper.png");
      box-shadow:
        inset 0 0 40px rgba(0,0,0,0.35),
        0 0 20px rgba(0,0,0,0.25);
    }

    #info h2 {
      margin-top: 0;
      margin-bottom: 8px;
      font-family: "Cinzel", serif;
      color: #3b2a18;
      font-size: 2rem;
    }

    #info h3 {
      margin-top: 0;
      margin-bottom: 14px;
      color: #6b4b2a;
      font-family: "Cinzel", serif;
      font-size: 1.15rem;
    }

    #info p {
      margin-top: 0;
      margin-bottom: 10px;
    }

    #info img {
      width: 100%;
      margin-top: 16px;
      border-radius: 8px;
      border: 2px solid #7a5a32;
      box-shadow: 0 0 12px rgba(0,0,0,0.35);
    }

    .clickable-image {
      cursor: zoom-in;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .clickable-image:hover {
      transform: scale(1.02);
      box-shadow: 0 0 18px rgba(0,0,0,0.45);
    }

    .info-section {
      margin-top: 14px;
      padding-top: 8px;
      border-top: 1px solid rgba(74, 50, 21, 0.25);
    }

    .info-section strong {
      display: inline-block;
      margin-bottom: 4px;
      color: #6b4b2a;
      font-family: "Cinzel", serif;
    }

    #image-modal {
      display: none;
      position: fixed;
      z-index: 9999;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.88);
      justify-content: center;
      align-items: center;
      padding: 20px;
      box-sizing: border-box;
    }

    #modal-img {
      max-width: 92%;
      max-height: 92%;
      border: 4px solid #c9a44c;
      border-radius: 10px;
      box-shadow: 0 0 30px rgba(0,0,0,0.8);
      background: #111;
    }

    #close-modal {
      position: absolute;
      top: 20px;
      right: 40px;
      font-size: 42px;
      line-height: 1;
      color: #f0d68a;
      cursor: pointer;
      user-select: none;
      text-shadow: 0 0 10px rgba(0,0,0,0.7);
    }

    #close-modal:hover {
      color: #fff2c2;
    }
  </style>
</head>
<body>

<div id="map-container">
  <div id="zoom-controls">
    <button class="zoom-btn" id="zoom-in">+</button>
    <button class="zoom-btn" id="zoom-out">−</button>
    <button class="zoom-btn" id="zoom-reset">Reset</button>
  </div>

  <div id="map-stage">
    <img id="map">
  </div>
</div>

<div id="info">
  <h2>Informations</h2>
  <p>Clique sur une ville</p>
</div>

<div id="image-modal">
  <span id="close-modal">&times;</span>
  <img id="modal-img" alt="Carte agrandie">
</div>

<script>
fetch("thair.json")
  .then(res => res.json())
  .then(data => {
    const country = data.countries[0];
    const map = document.getElementById("map");
    const mapStage = document.getElementById("map-stage");

    map.src = country.map;

    map.onload = () => {
      country.cities.forEach(city => {
        const marker = document.createElement("div");
        marker.className = "marker";

        let icon = "📍";

        if (["karan", "ekine", "fortma", "okren"].includes(city.id)) {
          icon = "👑";
        } else if (["lemenia", "sadia", "al-deora"].includes(city.id)) {
          icon = "🌿";
        } else if (["bavix", "var-lorhdir"].includes(city.id)) {
          icon = "⚒️";
        } else if (["firmak", "beletor"].includes(city.id)) {
          icon = "⚔️";
        } else if (["pont", "port-sybur", "sombres-landes"].includes(city.id)) {
          icon = "🏰";
        }

        marker.innerHTML = `${icon} ${city.name}`;
        marker.style.left = city.position.x + "%";
        marker.style.top = city.position.y + "%";

        marker.onclick = () => {
          document.getElementById("info").innerHTML = `
            <h2>${city.name}</h2>
            ${city.title ? `<h3>${city.title}</h3>` : ""}
            ${city.description ? `<p>${city.description}</p>` : ""}

            ${city.districts?.south ? `
              <div class="info-section">
                <strong>Zone sud :</strong>
                <p>${city.districts.south}</p>
              </div>
            ` : ""}

            ${city.districts?.north ? `
              <div class="info-section">
                <strong>Zone nord :</strong>
                <p>${city.districts.north}</p>
              </div>
            ` : ""}

            ${city.history ? `
              <div class="info-section">
                <strong>Histoire :</strong>
                <p>${city.history}</p>
              </div>
            ` : ""}

            ${city.economy ? `
              <div class="info-section">
                <strong>Économie :</strong>
                <p>${city.economy}</p>
              </div>
            ` : ""}

            ${city.society ? `
              <div class="info-section">
                <strong>Société :</strong>
                <p>${city.society}</p>
              </div>
            ` : ""}

            ${city.reputation ? `
              <div class="info-section">
                <strong>Réputation :</strong>
                <p>${city.reputation}</p>
              </div>
            ` : ""}

            ${city.education ? `
              <div class="info-section">
                <strong>Université :</strong>
                <p>${city.education}</p>
              </div>
            ` : ""}

            ${city.military ? `
              <div class="info-section">
                <strong>Forces armées :</strong>
                <p>${city.military}</p>
              </div>
            ` : ""}

            ${city.mystery ? `
              <div class="info-section">
                <strong>Mystère :</strong>
                <p>${city.mystery}</p>
              </div>
            ` : ""}

            ${city.law ? `
              <div class="info-section">
                <strong>Interdits :</strong>
                <p>${city.law}</p>
              </div>
            ` : ""}

            ${city.politics ? `
              <div class="info-section">
                <strong>Pouvoir :</strong>
                <p>${city.politics}</p>
              </div>
            ` : ""}

            ${city.daily_life ? `
              <div class="info-section">
                <strong>Vie quotidienne :</strong>
                <p>${city.daily_life}</p>
              </div>
            ` : ""}

            ${city.landmark ? `
              <div class="info-section">
                <strong>Particularité :</strong>
                <p>${city.landmark}</p>
              </div>
            ` : ""}

            ${city.culture ? `
              <div class="info-section">
                <strong>Culture :</strong>
                <p>${city.culture}</p>
              </div>
            ` : ""}

            ${city.entertainment ? `
              <div class="info-section">
                <strong>Divertissement :</strong>
                <p>${city.entertainment}</p>
              </div>
            ` : ""}

            ${city.religion ? `
              <div class="info-section">
                <strong>Religion :</strong>
                <p>${city.religion}</p>
              </div>
            ` : ""}

            ${city.map ? `<img src="${city.map}" alt="Carte de ${city.name}" class="clickable-image">` : ""}
          `;
        };

        mapStage.appendChild(marker);
      });

      initMapZoom();
    };
  });

/* Zoom image description */
document.addEventListener("click", function(e) {
  if (e.target.classList.contains("clickable-image")) {
    const modal = document.getElementById("image-modal");
    const modalImg = document.getElementById("modal-img");
    modal.style.display = "flex";
    modalImg.src = e.target.src;
    modalImg.alt = e.target.alt || "Carte agrandie";
  }
});

document.getElementById("close-modal").onclick = function() {
  document.getElementById("image-modal").style.display = "none";
};

document.getElementById("image-modal").onclick = function(e) {
  if (e.target.id === "image-modal") {
    this.style.display = "none";
  }
};

/* Zoom + déplacement carte principale */
function initMapZoom() {
  const container = document.getElementById("map-container");
  const stage = document.getElementById("map-stage");
  const zoomInBtn = document.getElementById("zoom-in");
  const zoomOutBtn = document.getElementById("zoom-out");
  const zoomResetBtn = document.getElementById("zoom-reset");

  let scale = 1;
  const minScale = 0.6;
  const maxScale = 2.5;
  const step = 0.1;

  function applyZoom() {
    stage.style.transform = `scale(${scale})`;
  }

  zoomInBtn.addEventListener("click", () => {
    scale = Math.min(maxScale, scale + step);
    applyZoom();
  });

  zoomOutBtn.addEventListener("click", () => {
    scale = Math.max(minScale, scale - step);
    applyZoom();
  });

  zoomResetBtn.addEventListener("click", () => {
    scale = 1;
    applyZoom();
    container.scrollLeft = 0;
    container.scrollTop = 0;
  });

  container.addEventListener("wheel", (e) => {
    e.preventDefault();

    const oldScale = scale;
    if (e.deltaY < 0) {
      scale = Math.min(maxScale, scale + step);
    } else {
      scale = Math.max(minScale, scale - step);
    }

    if (oldScale !== scale) {
      const rect = container.getBoundingClientRect();
      const offsetX = e.clientX - rect.left + container.scrollLeft;
      const offsetY = e.clientY - rect.top + container.scrollTop;

      const ratio = scale / oldScale;

      applyZoom();

      container.scrollLeft = (offsetX * ratio) - (e.clientX - rect.left);
      container.scrollTop = (offsetY * ratio) - (e.clientY - rect.top);
    }
  }, { passive: false });

  let isDragging = false;
  let startX = 0;
  let startY = 0;
  let scrollLeft = 0;
  let scrollTop = 0;

  container.addEventListener("mousedown", (e) => {
    if (e.target.classList.contains("marker")) return;
    isDragging = true;
    container.classList.add("dragging");
    startX = e.pageX;
    startY = e.pageY;
    scrollLeft = container.scrollLeft;
    scrollTop = container.scrollTop;
  });

  window.addEventListener("mouseup", () => {
    isDragging = false;
    container.classList.remove("dragging");
  });

  container.addEventListener("mousemove", (e) => {
    if (!isDragging) return;
    e.preventDefault();
    const dx = e.pageX - startX;
    const dy = e.pageY - startY;
    container.scrollLeft = scrollLeft - dx;
    container.scrollTop = scrollTop - dy;
  });
}
</script>

</body>
</html>
