<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Carte JDR</title>
  <style>
    body {
      margin: 0;
      background: #222;
      color: white;
      font-family: Arial;
    }

    #map-container {
      position: relative;
      width: 100%;
    }

    #map {
      width: 100%;
      display: block;
    }

    .marker {
      position: absolute;
      transform: translate(-50%, -50%);
      background: red;
      color: white;
      padding: 4px 8px;
      cursor: pointer;
      border-radius: 5px;
    }
  </style>
</head>
<body>

<div id="map-container">
  <img id="map" src="Maps/RUNA.jpg">

  <!-- Exemple de point -->
  <div class="marker" style="left:50%; top:40%;">
    Ville
  </div>
</div>

</body>
</html>
