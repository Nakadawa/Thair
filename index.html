<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Continent de Thair</title>
  <style>
    body {
      margin: 0;
      display: flex;
      height: 100vh;
      font-family: Arial;
    }

    #map-container {
      position: relative;
      width: 70%;
      overflow: auto;
      background: #111;
    }

    #map {
      width: 100%;
      display: block;
    }

    .marker {
      position: absolute;
      transform: translate(-50%, -50%);
      background: darkred;
      color: white;
      padding: 5px 10px;
      border-radius: 5px;
      cursor: pointer;
      border: 1px solid rgba(255,255,255,0.4);
    }

    .marker:hover {
      background: crimson;
    }

    #info {
      width: 30%;
      padding: 20px;
      background: #222;
      color: white;
      overflow-y: auto;
      box-sizing: border-box;
    }

    #info h2 {
      margin-top: 0;
    }

    #info h3 {
      margin-bottom: 10px;
      color: #d8c28f;
    }

    #info img {
      width: 100%;
      margin-top: 12px;
      border-radius: 8px;
      border: 2px solid #555;
      box-shadow: 0 0 10px rgba(0,0,0,0.5);
    }

    .info-section {
      margin-top: 12px;
    }

    .info-section strong {
      color: #f0d68a;
    }
  </style>
</head>
<body>

<div id="map-container">
  <img id="map">
</div>

<div id="info">
  <h2>Informations</h2>
  <p>Clique sur une ville</p>
</div>

<script>
fetch("thair.json")
  .then(res => res.json())
  .then(data => {
    const country = data.countries[0];
    const map = document.getElementById("map");
    const container = document.getElementById("map-container");

    map.src = country.map;

    map.onload = () => {
      country.cities.forEach(city => {
        const marker = document.createElement("div");

        marker.className = "marker";
        marker.textContent = city.name;

        marker.style.left = city.position.x + "%";
        marker.style.top = city.position.y + "%";

        marker.onclick = () => {
          document.getElementById("info").innerHTML = `
            <h2>${city.name}</h2>
            ${city.title ? `<h3>${city.title}</h3>` : ""}
            ${city.description ? `<p>${city.description}</p>` : ""}

            ${city.districts?.south ? `
              <div class="info-section">
                <strong>Zone sud :</strong>
                <p>${city.districts.south}</p>
              </div>
            ` : ""}

            ${city.districts?.north ? `
              <div class="info-section">
                <strong>Zone nord :</strong>
                <p>${city.districts.north}</p>
              </div>
            ` : ""}

            ${city.history ? `
              <div class="info-section">
                <strong>Histoire :</strong>
                <p>${city.history}</p>
              </div>
            ` : ""}

            ${city.economy ? `
              <div class="info-section">
                <strong>Économie :</strong>
                <p>${city.economy}</p>
              </div>
            ` : ""}

            ${city.society ? `
              <div class="info-section">
                <strong>Société :</strong>
                <p>${city.society}</p>
              </div>
            ` : ""}

            ${city.reputation ? `
              <div class="info-section">
                <strong>Réputation :</strong>
                <p>${city.reputation}</p>
              </div>
            ` : ""}

            ${city.education ? `
              <div class="info-section">
                <strong>Université :</strong>
                <p>${city.education}</p>
              </div>
            ` : ""}

            ${city.military ? `
              <div class="info-section">
                <strong>Forces armées :</strong>
                <p>${city.military}</p>
              </div>
            ` : ""}

            ${city.mystery ? `
              <div class="info-section">
                <strong>Mystère :</strong>
                <p>${city.mystery}</p>
              </div>
            ` : ""}

            ${city.law ? `
              <div class="info-section">
                <strong>Interdits :</strong>
                <p>${city.law}</p>
              </div>
            ` : ""}

            ${city.politics ? `
              <div class="info-section">
                <strong>Pouvoir :</strong>
                <p>${city.politics}</p>
              </div>
            ` : ""}

            ${city.daily_life ? `
              <div class="info-section">
                <strong>Vie quotidienne :</strong>
                <p>${city.daily_life}</p>
              </div>
            ` : ""}

            ${city.landmark ? `
              <div class="info-section">
                <strong>Particularité :</strong>
                <p>${city.landmark}</p>
              </div>
            ` : ""}
            ${city.culture ? `
  <div class="info-section">
    <strong>Culture :</strong>
    <p>${city.culture}</p>
  </div>
` : ""}

${city.entertainment ? `
  <div class="info-section">
    <strong>Divertissement :</strong>
    <p>${city.entertainment}</p>
  </div>
` : ""}

${city.religion ? `
  <div class="info-section">
    <strong>Religion :</strong>
    <p>${city.religion}</p>
  </div>
` : ""}
${city.nature ? `
  <div class="info-section">
    <strong>Nature :</strong>
    <p>${city.nature}</p>
  </div>
` : ""}
${city.industry ? `
  <div class="info-section">
    <strong>Artisanat :</strong>
    <p>${city.industry}</p>
  </div>
` : ""}

${city.security ? `
  <div class="info-section">
    <strong>Sécurité :</strong>
    <p>${city.security}</p>
  </div>
` : ""}

${city.energy ? `
  <div class="info-section">
    <strong>Énergie :</strong>
    <p>${city.energy}</p>
  </div>
` : ""}
${city.leadership ? `
  <div class="info-section">
    <strong>Dirigeant :</strong>
    <p>${city.leadership}</p>
  </div>
` : ""}
${city.external ? `
  <div class="info-section">
    <strong>Extérieur :</strong>
    <p>${city.external}</p>
  </div>
` : ""}
${city.crime ? `
  <div class="info-section">
    <strong>Criminalité :</strong>
    <p>${city.crime}</p>
  </div>
` : ""}

            ${city.map ? `<img src="${city.map}" alt="Carte de ${city.name}">` : ""}
          `;
        };

        container.appendChild(marker);
      });
    };
  });
</script>

</body>
</html>
